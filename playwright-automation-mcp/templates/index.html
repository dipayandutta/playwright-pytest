<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .login-wrapper {
      display: flex;
      height: 100vh;
    }

    .left-panel {
      background-color: #0d6efd;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .left-panel h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .left-panel p {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    .right-panel {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8f9fa;
    }

    .login-box {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
    }

    .login-box h2 {
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #212529;
    }

    .form-control:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
    }

    .btn-login {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      margin-top: 1rem;
      transition: background-color 0.2s;
    }

    .btn-login:hover {
      background-color: #0b5ed7;
      border-color: #0a58ca;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">

    <!-- Left blue panel -->
    <div class="left-panel">
      <h1>Welcome Back</h1>
      <p>Sign in to continue</p>
    </div>

    <!-- Right form panel -->
    <div class="right-panel">
      <div class="login-box">
        <h2>Sign In</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              placeholder="Enter username"
              required
              autofocus
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              placeholder="Enter password"
              required
            />
          </div>
          <button type="submit" class="btn btn-login">Login</button>
        </form>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
