<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.08);
      width: 320px;
      padding: 32px;
    }

    .login-card h1 {
      margin: 0 0 24px;
      font-size: 24px;
      color: #333333;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #555555;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      font-size: 14px;
      border: 1px solid #d2dbe8;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #4b8cff;
      outline: none;
      box-shadow: 0 0 0 3px rgba(75, 140, 255, 0.15);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      color: #ffffff;
      background: #4b8cff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .submit-btn:hover {
      background: #3a6ee0;
    }

    .footer-text {
      margin-top: 16px;
      font-size: 13px;
      color: #777777;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>Sign In</h1>
    <form>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select class="form-control" data-style="btn-info" id="role" name="role">
            <option value="stud">Student</option>
            <option value="teach">Teacher</option>
            <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label for="terms" class="text-info">
            <span>
                <input id="terms" name="terms" type="checkbox">

            </span>
            <span class="text-white termsText">
                I agree to the terms and conditions
            </span>
        </label>
      </div>
      <button class="submit-btn" type="submit">Login</button>
    </form>
    <p class="footer-text">Use this page to test Playwright login flows.</p>
  </div>
</body>
</html>
